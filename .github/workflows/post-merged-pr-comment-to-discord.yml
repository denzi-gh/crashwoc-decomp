name: Post merged PR report to Discord

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to test"
        required: true
      dry_run:
        description: "true = log only, do not send to Discord"
        required: true
        default: "true"

jobs:
  post-report:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      issues: read
      pull-requests: read

    steps:
      - name: Find bot comment and post Discord message
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_2: ${{ secrets.DISCORD_WEBHOOK_URL_2 }}
          BOT_LOGIN: decomp-dev[bot]
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        with:
          script: |
            const isManual = context.eventName === "workflow_dispatch";

            const issueNumber = isManual
              ? Number(process.env.INPUT_PR_NUMBER)
              : context.payload.pull_request.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber
            }).then(r => r.data);

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              }
            );

            const botComments = comments.filter(c =>
              c.user?.login === process.env.BOT_LOGIN ||
              c.user?.login === "decomp-dev"
            );

            if (botComments.length === 0) {
              core.setFailed("No bot comment found.");
              return;
            }

            const reportComment =
              [...botComments].reverse().find(c => (c.body || "").includes("Matched code:")) ||
              botComments[botComments.length - 1];

            const body = reportComment.body || "";

            if (!body.trim()) {
              core.setFailed("Bot comment is empty.");
              return;
            }

            function safe(value, fallback = "") {
              return value == null ? fallback : String(value);
            }

            function rpad(str, width) {
              str = safe(str);
              return str + " ".repeat(Math.max(0, width - str.length));
            }

            function lpad(str, width) {
              str = safe(str);
              return " ".repeat(Math.max(0, width - str.length)) + str;
            }

            function trunc(str, width) {
              str = safe(str);
              if (str.length <= width) return str;
              if (width <= 1) return str.slice(0, width);
              return str.slice(0, width - 1) + ".";
            }

            function renderTable(rows) {
              if (!rows.length) return "```text\n(none)\n```";

              const normalizedRows = rows.map(r => ({
                unit: safe(r.unit),
                item: safe(r.item),
                bytes: safe(r.bytes),
                before: safe(r.before),
                after: safe(r.after),
              }));

              const UNIT_W = 14;
              const ITEM_W = 30;
              const BYTES_W = 7;
              const BEFORE_W = 8;
              const AFTER_W = 8;

              const header =
                rpad("UNIT", UNIT_W) + " " +
                rpad("ITEM", ITEM_W) + " " +
                lpad("BYTES", BYTES_W) + " " +
                lpad("BEFORE", BEFORE_W) + " " +
                lpad("AFTER", AFTER_W);

              const sep =
                "-".repeat(UNIT_W) + " " +
                "-".repeat(ITEM_W) + " " +
                "-".repeat(BYTES_W) + " " +
                "-".repeat(BEFORE_W) + " " +
                "-".repeat(AFTER_W);

              const lines = normalizedRows.map(r =>
                rpad(trunc(r.unit, UNIT_W), UNIT_W) + " " +
                rpad(trunc(r.item, ITEM_W), ITEM_W) + " " +
                lpad(trunc(r.bytes, BYTES_W), BYTES_W) + " " +
                lpad(trunc(r.before, BEFORE_W), BEFORE_W) + " " +
                lpad(trunc(r.after, AFTER_W), AFTER_W)
              );

              let text = [header, sep, ...lines].join("\n");

              if (text.length > 1200) {
                const trimmed = [];
                let total = header.length + sep.length + 2;

                for (const line of lines) {
                  if (total + line.length + 1 > 1100) break;
                  trimmed.push(line);
                  total += line.length + 1;
                }

                const omitted = lines.length - trimmed.length;
                if (omitted > 0) {
                  trimmed.push(`... (+${omitted} more rows)`);
                }

                text = [header, sep, ...trimmed].join("\n");
              }

              return "```text\n" + text + "\n```";
            }

            function parseReport(rawComment) {
              const lines = rawComment.split(/\r?\n/);

              const headerLines = [];
              const sections = [];

              let inDetailsBlock = false;
              let seenFirstSection = false;

              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const trimmed = line.trim();

                const summaryMatch = trimmed.match(/^<summary>\s*(.+?)\s*<\/summary>$/i);

                if (
                  !seenFirstSection &&
                  !inDetailsBlock &&
                  !summaryMatch &&
                  trimmed !== "<details>" &&
                  trimmed !== "</details>"
                ) {
                  if (trimmed) headerLines.push(line.trimEnd());
                }

                if (trimmed === "<details>") {
                  inDetailsBlock = true;
                  continue;
                }

                if (!summaryMatch) continue;

                seenFirstSection = true;

                const summaryText = summaryMatch[1].trim();
                const rows = [];
                let inTable = false;

                for (let j = i + 1; j < lines.length; j++) {
                  const inner = lines[j].trim();

                  if (inner === "</details>") {
                    i = j;
                    inDetailsBlock = false;
                    break;
                  }

                  if (!inner) continue;

                  if (inner.startsWith("|")) {
                    const parts = inner.split("|").map(s => s.trim()).filter(Boolean);

                    const isHeaderRow =
                      parts.length >= 5 &&
                      parts[0].toLowerCase() === "unit";

                    const isSeparatorRow =
                      parts.length > 0 &&
                      parts.every(p => /^-+$/.test(p));

                    if (isHeaderRow) {
                      inTable = true;
                      continue;
                    }

                    if (isSeparatorRow) {
                      continue;
                    }

                    if (inTable && parts.length >= 5) {
                      rows.push({
                        unit: safe(parts[0]),
                        item: safe(parts[1]),
                        bytes: safe(parts[2]),
                        before: safe(parts[3]),
                        after: safe(parts[4]),
                      });
                    }
                  }
                }

                sections.push({
                  summaryText,
                  rows
                });
              }

              return {
                headerText: headerLines.join("\n"),
                sections
              };
            }

            function buildMessageChunks(rawComment) {
              const parsed = parseReport(rawComment);
              const chunks = [];
              let current = "";

              function pushBlock(block) {
                if (!block || !block.trim()) return;

                if (!current) {
                  current = block;
                  return;
                }

                if ((current + "\n\n" + block).length <= 1900) {
                  current += "\n\n" + block;
                } else {
                  chunks.push(current);
                  current = block;
                }
              }

              if (parsed.headerText) {
                pushBlock(parsed.headerText);
              }

              for (const section of parsed.sections) {
                const block = `${section.summaryText}\n\n${renderTable(section.rows)}`;
                pushBlock(block);
              }

              if (current) {
                chunks.push(current);
              }

              if (!chunks.length) {
                const fallback = rawComment.trim();
                for (let i = 0; i < fallback.length; i += 1900) {
                  chunks.push(fallback.slice(i, i + 1900));
                }
              }

              return chunks;
            }

            const chunks = buildMessageChunks(body);

            core.info("Discord message preview:");
            core.info(JSON.stringify(chunks, null, 2));

            const webhookTargets = [
              { name: "primary", url: safe(process.env.DISCORD_WEBHOOK_URL).trim() },
              { name: "secondary", url: safe(process.env.DISCORD_WEBHOOK_URL_2).trim() },
            ].filter(target => target.url);

            if (webhookTargets.length === 0) {
              core.setFailed("No Discord webhook configured.");
              return;
            }

            core.info(`Prepared ${chunks.length} Discord chunk(s) for ${webhookTargets.length} webhook target(s).`);

            if (process.env.INPUT_DRY_RUN === "true") {
              core.info("Dry run enabled. Nothing will be sent to Discord.");
              return;
            }

            for (const target of webhookTargets) {
              for (let index = 0; index < chunks.length; index++) {
                const payload = {
                  content: chunks[index],
                  username: `Crash: Wrath of Cortex Decompilation Report • PR #${safe(pr.number)}`,
                  avatar_url: "https://cdn2.steamgriddb.com/icon_thumb/3c6d4f6a20e08ad47557b4fc5e67dbc8.png"
                };

                const res = await fetch(target.url, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload)
                });

                if (!res.ok) {
                  const text = await res.text();
                  core.setFailed(
                    `Discord webhook '${target.name}' failed on chunk ${index + 1}: ${res.status} ${text}`
                  );
                  return;
                }
              }
            }
