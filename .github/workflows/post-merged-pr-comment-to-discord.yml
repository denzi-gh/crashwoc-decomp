name: Post merged PR report to Discord

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to test"
        required: true
      dry_run:
        description: "true = nur loggen, nichts an Discord senden"
        required: true
        default: "true"

jobs:
  post-report:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      issues: read
      pull-requests: read

    steps:
      - name: Find bot comment and post Discord embed
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BOT_LOGIN: decomp-dev[bot]
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        with:
          script: |
            const isManual = context.eventName === "workflow_dispatch";

            const issue_number = isManual
              ? Number(process.env.INPUT_PR_NUMBER)
              : context.payload.pull_request.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number
            }).then(r => r.data);

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number
              }
            );

            const botComments = comments.filter(c =>
              c.user?.login === process.env.BOT_LOGIN ||
              c.user?.login === "decomp-dev"
            );

            if (botComments.length === 0) {
              core.setFailed("Kein Bot-Kommentar gefunden.");
              return;
            }

            const reportComment = [...botComments].reverse().find(c =>
              (c.body || "").includes("Matched code:")
            ) || botComments[botComments.length - 1];

            const body = reportComment.body || "";

            if (!body.trim()) {
              core.setFailed("Bot-Kommentar ist leer.");
              return;
            }

            function firstMatch(regex, fallback = null) {
              return body.match(regex)?.[1]?.trim() ?? fallback;
            }

            function extractSection(summaryEmoji, summaryText) {
              const lines = body.split(/\r?\n/);
              const start = lines.findIndex(
                line => line.includes("<summary>") &&
                        line.includes(summaryEmoji) &&
                        line.includes(summaryText)
              );

              if (start === -1) return null;

              const rows = [];
              let inTable = false;

              for (let i = start + 1; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith("</details>")) break;
                if (!line) continue;

                if (line.startsWith("| Unit |")) {
                  inTable = true;
                  continue;
                }

                if (line.startsWith("| - |")) continue;

                if (inTable && line.startsWith("|")) {
                  const parts = line.split("|").map(s => s.trim()).filter(Boolean);
                  if (parts.length >= 5) {
                    rows.push({
                      unit: parts[0],
                      item: parts[1],
                      bytes: parts[2],
                      before: parts[3],
                      after: parts[4],
                    });
                  }
                }
              }

              const escapedEmoji = summaryEmoji.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const countMatch = body.match(
                new RegExp(`${escapedEmoji}\\s*(\\d+)\\s+${summaryText}`, "i")
              );

              return {
                count: countMatch?.[1] || "0",
                rows
              };
            }

            function pad(str, len) {
              str = String(str);
              return str.length >= len ? str.slice(0, len) : str + " ".repeat(len - str.length);
            }

            function tableToCodeBlock(rows) {
              if (!rows.length) return "```text\n(none)\n```";

              const unitW = Math.min(18, Math.max(4, ...rows.map(r => r.unit.length)));
              const itemW = Math.min(24, Math.max(4, ...rows.map(r => r.item.length)));
              const bytesW = Math.max(5, ...rows.map(r => r.bytes.length));
              const beforeW = Math.max(6, ...rows.map(r => r.before.length));
              const afterW = Math.max(6, ...rows.map(r => r.after.length));

              const header =
                `${pad("Unit", unitW)}  ${pad("Item", itemW)}  ${pad("Bytes", bytesW)}  ${pad("Before", beforeW)}  ${pad("After", afterW)}`;
              const sep =
                `${"-".repeat(unitW)}  ${"-".repeat(itemW)}  ${"-".repeat(bytesW)}  ${"-".repeat(beforeW)}  ${"-".repeat(afterW)}`;

              const lines = rows.map(r =>
                `${pad(r.unit, unitW)}  ${pad(r.item, itemW)}  ${pad(r.bytes, bytesW)}  ${pad(r.before, beforeW)}  ${pad(r.after, afterW)}`
              );

              let text = [header, sep, ...lines].join("\n");

              if (text.length > 950) {
                const trimmedLines = [];
                let total = header.length + sep.length + 2;

                for (const line of lines) {
                  if (total + line.length + 1 > 900) break;
                  trimmedLines.push(line);
                  total += line.length + 1;
                }

                const omitted = rows.length - trimmedLines.length;
                text = [
                  header,
                  sep,
                  ...trimmedLines,
                  omitted > 0 ? `... (+${omitted} more rows)` : null
                ].filter(Boolean).join("\n");
              }

              return "```text\n" + text + "\n```";
            }

            const reportName = firstMatch(/Report for\s+([^\n(]+)/i, pr.title);
            const matchedCode = firstMatch(/Matched code:\s*([\d.]+%)/i, "?");
            const deltaPercent = firstMatch(/Matched code:.*?\(([+-][\d.]+%)\s*,/i, "?");
            const deltaBytes = firstMatch(/Matched code:.*?,\s*([+-]?\d+\s*bytes)\)/i, "?");

            const newMatches = extractSection("✅", "new matches");
            const improvements = extractSection("📈", "improvements in unmatched items");
            const regressions =
              extractSection("📉", "regression in an unmatched item") ||
              extractSection("📉", "regressions in unmatched items") ||
              extractSection("📉", "regression");

            const fields = [
              {
                name: "Matched code",
                value: `${matchedCode} (${deltaPercent}, ${deltaBytes})`,
                inline: false
              }
            ];

            if (newMatches && newMatches.rows.length) {
              fields.push({
                name: `✅ ${newMatches.count} new matches`,
                value: tableToCodeBlock(newMatches.rows),
                inline: false
              });
            }

            if (improvements && improvements.rows.length) {
              fields.push({
                name: `📈 ${improvements.count} improvements in unmatched items`,
                value: tableToCodeBlock(improvements.rows),
                inline: false
              });
            }

            if (regressions && regressions.rows.length) {
              fields.push({
                name: `📉 ${regressions.count} regression(s) in unmatched items`,
                value: tableToCodeBlock(regressions.rows),
                inline: false
              });
            }

            const payload = {
              username: "decomp-dev",
              embeds: [
                {
                  title: `${isManual ? "[TEST] " : ""}Report for ${reportName}`,
                  url: pr.html_url,
                  description: pr.title,
                  fields,
                  footer: {
                    text: `PR #${pr.number} • ${context.repo.owner}/${context.repo.repo}`
                  },
                  timestamp: new Date().toISOString()
                }
              ]
            };

            core.info("Discord payload:");
            core.info(JSON.stringify(payload, null, 2));

            if (process.env.INPUT_DRY_RUN === "true") {
              core.info("Dry run aktiv - nichts wird an Discord gesendet.");
              return;
            }

            const res = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              const text = await res.text();
              core.setFailed(`Discord webhook failed: ${res.status} ${text}`);
            }