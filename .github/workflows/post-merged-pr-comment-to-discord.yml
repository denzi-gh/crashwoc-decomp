name: Post merged PR bot comment to Discord

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to test"
        required: true
      dry_run:
        description: "true = nur loggen, nichts an Discord senden"
        required: true
        default: "true"

jobs:
  post-comment:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      issues: read
      pull-requests: read

    steps:
      - name: Find bot comment and send raw text to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BOT_LOGIN: decomp-dev[bot]
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        with:
          script: |
            const isManual = context.eventName === "workflow_dispatch";

            const issue_number = isManual
              ? Number(process.env.INPUT_PR_NUMBER)
              : context.payload.pull_request.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number
            }).then(r => r.data);

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number
              }
            );

            const botComments = comments.filter(c =>
              c.user?.login === process.env.BOT_LOGIN ||
              c.user?.login === "decomp-dev"
            );

            if (botComments.length === 0) {
              core.setFailed("Kein Bot-Kommentar gefunden.");
              return;
            }

            const latestComment = [...botComments].reverse().find(c =>
              (c.body || "").includes("Matched code:")
            ) || botComments[botComments.length - 1];

            const body = latestComment.body || "";

            if (!body.trim()) {
              core.setFailed("Bot-Kommentar ist leer.");
              return;
            }

            const trimmed = body.length > 1800 ? body.slice(0, 1800) + "\n..." : body;

            const message = {
              content: `${pr.html_url}\n\`\`\`md\n${trimmed}\n\`\`\``
            };

            core.info("Gefundener Kommentar:");
            core.info(body);

            if (process.env.INPUT_DRY_RUN === "true") {
              core.info("Dry run aktiv - nichts wird an Discord gesendet.");
              return;
            }

            const res = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(message)
            });

            if (!res.ok) {
              const text = await res.text();
              core.setFailed(`Discord webhook failed: ${res.status} ${text}`);
            }